server {
    listen 80;
    server_name fortress-designs.com www.fortress-designs.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        allow all;
    }

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fortress-designs.com www.fortress-designs.com;

    root /var/www/html/public;
    index index.php index.html;
    client_max_body_size 50m;

    ssl_certificate /etc/letsencrypt/live/fortress-designs.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fortress-designs.com/privkey.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Allow Laravel to serve /files/* (S3 proxy) before the static file regex.
    location ^~ /files/ {
        try_files $uri /index.php?$query_string;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|ttf|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_read_timeout 300;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
